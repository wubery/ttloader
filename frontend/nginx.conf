server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Авторизация теперь на уровне приложения (страница входа + сессия/Telegram),
    # см. backend/app/routers/auth.py. Basic Auth больше не используется.

    # Видео могут быть большими
    client_max_body_size 1024m;

    # Отдаём SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксируем API и файлы на бэкенд (пути сохраняем как есть, с /api)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 1024m;
    }
}
