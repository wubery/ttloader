server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Защита логином/паролем (сервер доступен из интернета).
    # Файл с логином/хэшем создаёт install.sh и монтирует в контейнер.
    # Закрывает всё сразу: панель, /api и /novnc.
    auth_basic "Video Poster";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Видео могут быть большими
    client_max_body_size 1024m;

    # Отдаём SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксируем API и файлы на бэкенд (пути сохраняем как есть, с /api)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 1024m;
    }

    # noVNC: статика клиента + websocket к экрану браузера входа (backend:6080).
    # Upgrade-заголовки обязательны для websocket (/novnc/websockify).
    location /novnc/ {
        proxy_pass http://backend:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
